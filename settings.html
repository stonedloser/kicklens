<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KickLens Settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1d22;
            color: #f1f1f1;
            padding: 20px;
            min-width: 400px;
        }
        h1 {
            color: #53fc18;
            font-size: 24px;
            margin-top: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #24272c;
            color: #f1f1f1;
            border: 1px solid #3a3f47;
            border-radius: 4px;
            padding: 10px;
            font-size: 14px;
            resize: vertical;
        }
        button {
            background-color: #53fc18;
            color: #1a1d22;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #48de14;
        }
        #status {
            margin-top: 10px;
            color: #53fc18;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>KickLens Settings</h1>
        
        <div>
            <label for="botList">Excluded Bots List</label>
            <p style="font-size: 12px; color: #a1a1aa; margin-top: -5px; margin-bottom: 10px;">
                Add or remove bot usernames to be excluded from chat analytics. One username per line.
            </p>
            <textarea id="botList"></textarea>
        </div>
        
        <button id="save">Save Settings</button>
        <div id="status"></div>
    </div>
    
    <script src="settings.js"></script>
</body>
</html>
